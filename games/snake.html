<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0f18; color: #e2e8f0; font-family: system-ui, sans-serif;
    }
    canvas { display: block; border: 2px solid #4df0ff; border-radius: 4px; background: #111827; }
    p { margin: 0.75rem 0 0; font-size: 0.9rem; opacity: 0.85; }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1300680676901926"
     crossorigin="anonymous"></script>
</head>
<body>
  <canvas id="c" width="400" height="400" aria-label="Snake game"></canvas>
  <p>Arrow keys to move · Space to restart</p>
  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const g = 20, cols = canvas.width / g, rows = canvas.height / g;
    let snake, food, dir, nextDir, tick, alive;

    function randCell() {
      let x, y;
      do {
        x = (Math.random() * cols) | 0;
        y = (Math.random() * rows) | 0;
      } while (snake.some((s) => s.x === x && s.y === y));
      return { x, y };
    }

    function reset() {
      snake = [{ x: 8, y: 10 }, { x: 7, y: 10 }, { x: 6, y: 10 }];
      food = randCell();
      dir = { x: 1, y: 0 };
      nextDir = { ...dir };
      tick = 0;
      alive = true;
    }

    function step() {
      if (!alive) return;
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
        alive = false;
        return;
      }
      if (snake.some((s) => s.x === head.x && s.y === head.y)) {
        alive = false;
        return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) food = randCell();
      else snake.pop();
    }

    function draw() {
      ctx.fillStyle = "#111827";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#22c55e";
      snake.forEach((s, i) => {
        ctx.globalAlpha = i === 0 ? 1 : 0.85;
        ctx.fillRect(s.x * g + 1, s.y * g + 1, g - 2, g - 2);
      });
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#f472b6";
      ctx.fillRect(food.x * g + 1, food.y * g + 1, g - 2, g - 2);
      if (!alive) {
        ctx.fillStyle = "rgba(0,0,0,0.65)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 22px system-ui";
        ctx.textAlign = "center";
        ctx.fillText("Game over — Space to restart", canvas.width / 2, canvas.height / 2);
      }
    }

    function loop(ts) {
      if (alive && ts - tick > 110) {
        tick = ts;
        step();
      }
      draw();
      requestAnimationFrame(loop);
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        reset();
        return;
      }
      const k = e.key;
      if (k === "ArrowUp" && dir.y === 0) nextDir = { x: 0, y: -1 };
      if (k === "ArrowDown" && dir.y === 0) nextDir = { x: 0, y: 1 };
      if (k === "ArrowLeft" && dir.x === 0) nextDir = { x: -1, y: 0 };
      if (k === "ArrowRight" && dir.x === 0) nextDir = { x: 1, y: 0 };
    });

    reset();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
