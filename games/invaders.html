<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #050510; color: #cbd5e1; font-family: system-ui, sans-serif;
    }
    canvas { border: 2px solid #a855f7; border-radius: 4px; background: #0f172a; }
    p { margin: 0.75rem 0 0; font-size: 0.9rem; opacity: 0.85; max-width: 420px; text-align: center; }
  </style>
</head>
<body>
  <canvas id="c" width="420" height="480" aria-label="Space invaders"></canvas>
  <p>← → move · Space shoot · Clear all rows to win</p>
  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    let player, bullets, enemies, enemyDir, ticks, won, lost, enemyShotCooldown;

    function reset() {
      player = { x: W / 2 - 20, y: H - 40, w: 40, h: 12 };
      bullets = [];
      enemies = [];
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 8; col++) {
          enemies.push({
            x: 40 + col * 44,
            y: 50 + row * 32,
            w: 32,
            h: 20,
            alive: true,
          });
        }
      }
      enemyDir = 1;
      ticks = 0;
      won = false;
      lost = false;
      enemyShotCooldown = 0;
    }

    function aliveEnemies() {
      return enemies.filter((e) => e.alive);
    }

    function update() {
      if (won || lost) return;
      ticks++;
      const speed = ticks % 28 === 0 ? 1 : 0;
      if (speed) {
        let hitEdge = false;
        aliveEnemies().forEach((e) => {
          e.x += enemyDir * 8;
          if (e.x <= 10 || e.x + e.w >= W - 10) hitEdge = true;
        });
        if (hitEdge) {
          enemyDir *= -1;
          aliveEnemies().forEach((e) => (e.y += 12));
        }
      }
      bullets.forEach((b) => (b.y += b.vy));
      bullets = bullets.filter((b) => b.y > -20 && b.y < H + 20);
      bullets.forEach((b) => {
        if (b.from === "player") {
          enemies.forEach((e) => {
            if (!e.alive) return;
            if (
              b.x < e.x + e.w &&
              b.x + 4 > e.x &&
              b.y < e.y + e.h &&
              b.y + 10 > e.y
            ) {
              e.alive = false;
              b.y = -999;
            }
          });
        }
      });
      if (aliveEnemies().length === 0) {
        won = true;
        return;
      }
      aliveEnemies().forEach((e) => {
        if (e.y + e.h >= player.y) lost = true;
      });
      enemyShotCooldown--;
      if (enemyShotCooldown <= 0 && aliveEnemies().length) {
        const pick = aliveEnemies()[(Math.random() * aliveEnemies().length) | 0];
        bullets.push({ x: pick.x + pick.w / 2, y: pick.y + pick.h, vy: 5, from: "enemy" });
        enemyShotCooldown = 40 + (Math.random() * 30) | 0;
      }
      bullets.forEach((b) => {
        if (b.from !== "enemy") return;
        if (
          b.x < player.x + player.w &&
          b.x + 4 > player.x &&
          b.y < player.y + player.h &&
          b.y + 8 > player.y
        )
          lost = true;
      });
    }

    function draw() {
      ctx.fillStyle = "#0f172a";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#4df0ff";
      ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.fillStyle = "#c084fc";
      enemies.forEach((e) => {
        if (e.alive) ctx.fillRect(e.x, e.y, e.w, e.h);
      });
      ctx.fillStyle = "#fbbf24";
      bullets.forEach((b) => ctx.fillRect(b.x, b.y, 4, b.from === "player" ? 10 : 8));
      if (won || lost) {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 24px system-ui";
        ctx.textAlign = "center";
        ctx.fillText(won ? "You win!" : "Game over", W / 2, H / 2 - 8);
        ctx.font = "14px system-ui";
        ctx.fillText("Space to play again", W / 2, H / 2 + 20);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        if (won || lost) reset();
        else bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, vy: -8, from: "player" });
        return;
      }
      if (won || lost) return;
      const step = 10;
      if (e.key === "ArrowLeft") player.x = Math.max(8, player.x - step);
      if (e.key === "ArrowRight") player.x = Math.min(W - player.w - 8, player.x + step);
    });

    reset();
    loop();
  </script>
</body>
</html>
