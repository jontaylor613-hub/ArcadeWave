<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game — ArcadeWave</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .gd-page {
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-deep, #060510);
      color: var(--neon-cyan, #22d3ee);
    }
    .gd-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.35);
      background: rgba(6, 5, 16, 0.92);
    }
    .gd-bar h1 {
      margin: 0;
      font-family: Orbitron, sans-serif;
      font-size: clamp(0.65rem, 2vw, 0.85rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--neon-cyan, #22d3ee);
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }
    .gd-back {
      font-family: "Share Tech Mono", monospace;
      font-size: 0.75rem;
      color: var(--neon-pink, #ff3d85);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid rgba(255, 61, 133, 0.45);
      border-radius: 4px;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .gd-back:hover {
      background: rgba(255, 61, 133, 0.15);
    }
    .gd-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      min-height: 0;
    }
    .gd-frame-wrap {
      width: 100%;
      max-width: min(100vw - 24px, 1920px);
      max-height: calc(100vh - 72px);
      position: relative;
      border: 1px solid rgba(168, 85, 247, 0.35);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.55);
      background: #000;
    }
    .gd-frame-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .gd-error {
      font-family: "Share Tech Mono", monospace;
      color: var(--neon-pink, #ff3d85);
      padding: 2rem;
      text-align: center;
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1300680676901926"
     crossorigin="anonymous"></script>
</head>
<body class="gd-page">
  <header class="gd-bar">
    <h1 id="gdTitle">GAME</h1>
    <a class="gd-back" href="../index.html">← Back to games</a>
  </header>
  <main class="gd-main">
    <div class="gd-frame-wrap" id="frameWrap" hidden>
      <iframe
        id="gameFrame"
        title="Game"
        allowfullscreen
        allow="gamepad *; fullscreen *"
      ></iframe>
    </div>
    <p class="gd-error" id="gdError" hidden>Invalid or missing game.</p>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var id = params.get("id");
      var w = parseInt(params.get("w") || "800", 10);
      var h = parseInt(params.get("h") || "600", 10);
      if (!Number.isFinite(w) || w < 100) w = 800;
      if (!Number.isFinite(h) || h < 100) h = 600;
      w = Math.min(4096, w);
      h = Math.min(4096, h);
      var t = params.get("t");
      var titleEl = document.getElementById("gdTitle");
      if (t) {
        document.title = t + " — ArcadeWave";
        titleEl.textContent = t.toUpperCase();
      }
      var wrap = document.getElementById("frameWrap");
      var frame = document.getElementById("gameFrame");
      var err = document.getElementById("gdError");
      if (!id || !/^[a-f0-9]{32}$/i.test(id)) {
        err.hidden = false;
        return;
      }
      wrap.style.aspectRatio = w + " / " + h;
      wrap.hidden = false;
      var ref = encodeURIComponent(location.href.split("#")[0]);
      frame.src =
        "https://html5.gamedistribution.com/" +
        id +
        "/?gd_sdk_referrer_url=" +
        ref;
    })();
  </script>
</body>
</html>
